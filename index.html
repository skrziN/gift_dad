<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego: Hijo Preferido</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f0f0f0;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    input {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
    #resultado {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎮 Juego</h2>
    <p>¿Cuál es tu hijo preferido?</p>
    <input type="text" id="respuesta" placeholder="Escribe tu respuesta">
    <br>
    <button onclick="verificar()">Responder</button>
    <p id="resultado"></p>
  </div>

  <script>
    function verificar() {
      const respuesta = document.getElementById('respuesta').value.trim().toLowerCase();
      const resultado = document.getElementById('resultado');

      if (respuesta === 'roberto') {
        resultado.textContent = '✅ ¡Correcto!';
        resultado.style.color = 'green';
      } else {
        resultado.textContent = '❌ Incorrecto, intenta de nuevo.';
        resultado.style.color = 'red';
      }
    }
  </script>
</body>
</html>
